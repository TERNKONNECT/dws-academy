name: Deploy Frontend

on:
  push:
    branches:
      - main # Change this to your default branch if different

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # These permissions are required for configuring AWS credentials using OIDC
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun (or Node.js)
        # Using bun since we saw bun.lockb in your project directory
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build the project
        env: 
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

            
        run: bun run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # If using IAM User access keys instead of OIDC, use these:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        # Sync the dist folder to the S3 bucket. Change YOUR_S3_BUCKET_NAME to the output from Terraform
        run: |
          aws s3 sync dist s3://${{ secrets.S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront Cache
        # Invalidate the cache to serve the new content. Change YOUR_DISTRIBUTION_ID to the output from Terraform
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
